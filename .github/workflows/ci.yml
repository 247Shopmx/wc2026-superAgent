name: WC2026 Superagent CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Ejecutar a las 12pm, 3pm, 5pm y 7pm hora central de México (CDT UTC-5)
    # Equivalente a 17:00, 20:00, 22:00 y 00:00 UTC
    - cron: '0 17,20,22,0 * * *'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint with Ruff
        run: |
          ruff check .
          
      - name: Test with pytest
        run: |
          pytest tests/ -v
        env:
          ALL_SPORTS_API_KEY: ${{ secrets.ALL_SPORTS_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}

  run-prediction-engine:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Superagent Prediction
        run: |
          python -m src.main
        env:
          ALL_SPORTS_API_KEY: ${{ secrets.ALL_SPORTS_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
