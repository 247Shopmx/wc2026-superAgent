[lint]
# Select rules to enable
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
]

# Ignore specific rules
ignore = [
    "E501",   # Line too long (handled by formatter)
]

[format]
# Format configuration
line-length = 88
